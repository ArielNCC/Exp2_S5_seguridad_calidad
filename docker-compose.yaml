version: '3.8'
services:
  mysql-cdy2203:
    build:
      context: ./database
    container_name: mysql-cdy2203
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u$MYSQL_USER", "-p$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8180:8180"
    depends_on:
      mysql-cdy2203:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: default
    # Puedes agregar más variables si tu backend las requiere
